name: release

# Push a tag matching v* (e.g. v0.2.0) to publish. The tag must
# match Cargo.toml's `version`; the workflow asserts this before
# anything destructive runs.
#
# What this ships:
#   1. Multi-arch container image (linux/amd64 + linux/arm64) at
#      ghcr.io/clavenar/clavenar-lite:{version} + :latest.
#   2. Static linux-x86_64 binary (musl) as a release asset, for
#      partners who want the binary outside a container.
#   3. A GitHub release with the matching CHANGELOG.md section as
#      the release body.
#
# First-time setup: after the first successful release run, flip
# the GHCR package to public — Settings → Packages → clavenar-lite →
# Change visibility → Public. Otherwise the docker run example in
# the README requires an auth'd pull.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required for `gh release create`
  packages: write   # required to push to ghcr.io

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Verify tag matches Cargo.toml version
        id: ver
        run: |
          TAG=${GITHUB_REF_NAME#v}
          CARGO_VERSION=$(grep -E '^version = ' Cargo.toml | head -1 | sed -E 's/version = "(.*)"/\1/')
          if [ "$TAG" != "$CARGO_VERSION" ]; then
            echo "::error::tag $GITHUB_REF_NAME (=$TAG) does not match Cargo.toml ($CARGO_VERSION)"
            exit 1
          fi
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push multi-arch image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/clavenar/clavenar-lite:${{ steps.ver.outputs.version }}
            ghcr.io/clavenar/clavenar-lite:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract CHANGELOG section for this version
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          # Pull the lines from "## [VERSION]" up to (not including) the
          # next "## [" header. We use `index($0, hdr)` for a literal
          # substring match — the alternative regex form ($0 ~ ...)
          # treats brackets as a character class and silently matches
          # nothing for `[X.Y.Z]`-style version headers.
          awk -v hdr="## [$VERSION] -" \
              'index($0, hdr) == 1 { flag=1; print; next }
               /^## \[/ && flag { exit }
               flag' \
              CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::error::no CHANGELOG section found for $VERSION"
            exit 1
          fi
          echo "---release-notes.md---"
          cat release-notes.md

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.97.0
          targets: x86_64-unknown-linux-musl

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: musl-release

      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build static linux-x86_64 binary
        run: |
          cargo build --release --locked --target x86_64-unknown-linux-musl
          BIN=target/x86_64-unknown-linux-musl/release/clavenar-lite
          file "$BIN"
          # Sanity: assert it really is static — dynamic libc linkage
          # defeats the entire reason we ship a musl build.
          if ldd "$BIN" 2>&1 | grep -qE '=>'; then
            echo "::error::binary is not statically linked"
            ldd "$BIN" || true
            exit 1
          fi
          VERSION="${{ steps.ver.outputs.version }}"
          ASSET="clavenar-lite-${VERSION}-x86_64-linux-musl.tar.gz"
          tar -czf "$ASSET" -C "$(dirname "$BIN")" "$(basename "$BIN")"
          sha256sum "$ASSET" | tee "${ASSET}.sha256"
          echo "asset=$ASSET" >> "$GITHUB_ENV"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "${GITHUB_REF_NAME} — clavenar-lite" \
            --notes-file release-notes.md \
            "$asset" \
            "${asset}.sha256"
